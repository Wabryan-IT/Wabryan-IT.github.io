name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:

  static-analysis:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: XSS surface scan
        run: |
          python3 - << 'PYEOF'
          import sys, re, glob
          with open('index.html') as f: html = f.read()
          issues = []
          inline = re.findall(r'\bon\w+="[^"]*"', html)
          real = [h for h in inline if not any(x in h.lower() for x in
                  ['ontent=','argin','adding','eight','inimum','aximum',
                   'idth','ource','edia','ethod','nctype'])]
          if real: issues.append(f'Inline handlers: {real[:3]}')
          if re.search(r'href\s*=\s*["\']javascript:', html, re.I):
              issues.append('javascript: protocol in href')
          js_files = glob.glob('js/**/*.js', recursive=True)
          print(f'  XSS scan: {len(js_files)+1} files')
          if issues:
              for i in issues: print(f'  FAIL  {i}')
              sys.exit(1)
          print('  pass  No XSS risks')
          PYEOF

      - name: Sensitive data scan
        run: |
          python3 - << 'PYEOF'
          import sys, re, glob
          files = glob.glob('*.html') + glob.glob('js/**/*.js', recursive=True)
          patterns = [
            (r'(?i)(api[_-]?key|apikey)\s*[:=]\s*["\'][^"\']{10,}', 'API key'),
            (r'(?i)(secret|password|passwd)\s*[:=]\s*["\'][^"\']{6,}', 'Secret'),
            (r'ghp_[a-zA-Z0-9]{36}', 'GitHub token'),
            (r'sk-[a-zA-Z0-9]{40,}', 'OpenAI key'),
          ]
          found = []
          for path in files:
              with open(path) as f: content = f.read()
              for pat, label in patterns:
                  for m in re.finditer(pat, content):
                      ln = content[:m.start()].count('\n') + 1
                      found.append(f'{path}:{ln} — {label}')
          if found:
              for f in found: print(f'  FAIL  {f}')
              sys.exit(1)
          print(f'  pass  No sensitive data in {len(files)} files')
          PYEOF

      - name: CSP validation
        run: |
          python3 - << 'PYEOF'
          import sys, re
          with open('index.html') as f: html = f.read()
          m = re.search(r'Content-Security-Policy[^>]+content="([^"]+)"', html)
          if not m:
              print('  FAIL  No CSP found'); sys.exit(1)
          csp = m.group(1)
          issues = []
          if "'unsafe-eval'" in csp: issues.append("unsafe-eval present")
          if 'frame-ancestors' not in csp: issues.append("Missing frame-ancestors")
          for d in ['default-src','script-src','style-src','img-src','frame-ancestors']:
              print(f"  {'pass' if d in csp else 'warn'}  {d}")
          if issues:
              for i in issues: print(f'  FAIL  {i}')
              sys.exit(1)
          print('  pass  CSP OK')
          PYEOF

      - name: Security headers
        run: |
          python3 - << 'PYEOF'
          import sys, re
          with open('index.html') as f: html = f.read()
          required = {
            'Content-Security-Policy': True,
            'X-Frame-Options':         True,
            'X-Content-Type-Options':  True,
            'Referrer-Policy':         True,
          }
          issues = []
          for name, req in required.items():
              found = name in html
              print(f"  {'pass' if found else 'FAIL'}  {name}")
              if not found and req: issues.append(name)
          if issues: sys.exit(1)
          PYEOF

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: npm audit
        run: npm audit --audit-level=high || true

      - name: Zero runtime deps
        run: |
          python3 - << 'PYEOF'
          import sys, json
          with open('package.json') as f: pkg = json.load(f)
          rt = pkg.get('dependencies', {})
          if rt:
              print(f'  warn  Runtime deps: {list(rt.keys())}')
          else:
              print('  pass  Zero runtime dependencies')
          PYEOF

  exposure-scan:
    name: Sensitive File Exposure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dangerous files
        run: |
          python3 - << 'PYEOF'
          import sys, os, glob
          dangerous = ['.env','.env.local','secrets.json','credentials.json']
          found = [f for f in dangerous if os.path.exists(f)]
          found += [f for f in glob.glob('**/*.pem',recursive=True)+glob.glob('**/*.key',recursive=True) if 'node_modules' not in f]
          if found:
              for f in found: print(f'  FAIL  {f}')
              sys.exit(1)
          print('  pass  No sensitive files')
          PYEOF

      - name: gitignore coverage
        run: |
          python3 - << 'PYEOF'
          with open('.gitignore') as f: gi = f.read()
          for p in ['.env','node_modules']:
              print(f"  {'pass' if p in gi else 'warn'}  .gitignore covers {p}")
          PYEOF

  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: External resource audit
        run: |
          python3 - << 'PYEOF'
          import sys, re, glob
          files = glob.glob('**/*.html',recursive=True) + glob.glob('js/**/*.js',recursive=True)
          allowed = ['fonts.googleapis.com','fonts.gstatic.com']
          issues = []
          for path in files:
              if 'node_modules' in path: continue
              with open(path) as f: content = f.read()
              for s in re.findall(r'<script[^>]+src="(https?://[^"]+)"', content):
                  if not any(h in s for h in allowed):
                      issues.append(f'{path}: {s}')
          if issues:
              print('  warn  Unexpected external scripts:')
              for i in issues: print(f'        {i}')
          else:
              print('  pass  No unexpected external scripts')
          PYEOF

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [static-analysis, dependency-audit, exposure-scan, supply-chain]
    if: always()
    steps:
      - name: Report
        run: |
          SA="${{ needs.static-analysis.result }}"
          DA="${{ needs.dependency-audit.result }}"
          ES="${{ needs.exposure-scan.result }}"
          SC="${{ needs.supply-chain.result }}"

          echo "========================================"
          echo " Security Scan Summary"
          echo "========================================"
          echo " static-analysis : $SA"
          echo " dependency-audit: $DA"
          echo " exposure-scan   : $ES"
          echo " supply-chain    : $SC"
          echo "========================================"

          if [[ "$SA" == "failure" || "$DA" == "failure" || "$ES" == "failure" || "$SC" == "failure" ]]; then
            echo "Security scan FAILED"
            exit 1
          fi
          echo "All security checks PASSED"
